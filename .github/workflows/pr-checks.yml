name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  required:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check Unreleased changelog has content
        run: |
          if ! awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found && NF{has_content=1} END{exit !has_content}' CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::The [Unreleased] section in CHANGELOG.md is empty. Add an entry describing your changes before merging."
            exit 1
          fi
          echo "✓ Unreleased changelog has content"
      - run: npm run build
      - run: npm run lint
      - run: npm test
