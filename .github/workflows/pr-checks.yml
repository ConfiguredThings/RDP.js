name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  required:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
            
      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Verify generated examples are up-to-date
        run: |
          npm run generate:examples
          if ! git diff --quiet src/examples/; then
            echo "::error::Generated example files are out of date. Run 'npm run generate:examples' and commit the changes."
            git diff src/examples/
            exit 1
          fi
          echo "✓ Generated examples match committed files"

      - name: Test
        run: npm test

      - name: Check Unreleased changelog has content
        if: github.actor != 'dependabot[bot]'
        run: |
          if ! awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found && NF{has_content=1} END{exit !has_content}' CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::The [Unreleased] section in CHANGELOG.md is empty. Add an entry describing your changes before merging."
            exit 1
          fi
          echo "✓ Unreleased changelog has content"
      - run: npm run build
      - run: npm run lint
      - run: npm test
