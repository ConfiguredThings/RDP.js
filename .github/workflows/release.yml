name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  pages: write
  attestations: write
  packages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  release:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get package version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag $TAG does not match package.json version $EXPECTED"
            exit 1
          fi
          echo "✓ Tag $TAG matches package version"

      - name: Check changelog entry exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -qE "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::No changelog section found for version $VERSION. Expected a heading matching '## [$VERSION]'."
            exit 1
          fi
          echo "✓ Changelog section found for $VERSION"

      - name: Check changelog comparison link exists
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -qE "^\[$VERSION\]:" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::No comparison link found for version $VERSION. Expected a line matching '[$VERSION]: https://...' at the bottom of CHANGELOG.md."
            exit 1
          fi
          echo "✓ Comparison link found for $VERSION"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install PlantUML
        run: |
          curl -fsSL -o /usr/local/bin/plantuml.jar \
            https://github.com/plantuml/plantuml/releases/download/v1.2026.2/plantuml-1.2026.2.jar
          printf '#!/bin/sh\nexec java -jar /usr/local/bin/plantuml.jar "$@"\n' \
            | sudo tee /usr/local/bin/plantuml > /dev/null
          sudo chmod +x /usr/local/bin/plantuml

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://npm.pkg.github.com'

      - name: Install library dependencies
        run: npm ci

      - name: Build library
        run: npm run build
      
      - name: Test
        run: npm test

      - name: Install docs-site dependencies
        run: npm ci
        working-directory: docs-site

      - name: Generate API docs
        run: npm run docs

      - name: Pack library
        run: npm pack

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.tgz'

      - name: Publish to GitHub Packages
        run: npm publish --provenance --access public *.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^(## |\[)/{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' \
            > release-notes.txt
          echo "Release notes:"
          cat release-notes.txt

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs site
        run: npm run build
        working-directory: docs-site

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/public

      - id: deployment
        uses: actions/deploy-pages@v5
