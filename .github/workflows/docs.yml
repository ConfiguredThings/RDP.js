name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PlantUML
        run: sudo apt-get install -y plantuml

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install library dependencies
        run: npm ci

      - name: Generate grammar index
        run: npm run generate:grammars

      - name: Build library
        run: npm run build

      - name: Verify generated examples are up-to-date
        run: |
          npm run generate:examples
          if ! git diff --quiet src/examples/; then
            echo "::error::Generated example files are out of date. Run 'npm run generate:examples' and commit the changes."
            git diff src/examples/
            exit 1
          fi
          echo "✓ Generated examples match committed files"

      - name: Generate API docs
        run: npm run docs

      - name: Install docs-site dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build docs site
        run: npm run build
        working-directory: docs-site

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/public

      - id: deployment
        uses: actions/deploy-pages@v5
