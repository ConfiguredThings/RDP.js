name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Install PlantUML
        run: |
          curl -fsSL -o /usr/local/bin/plantuml.jar \
            https://github.com/plantuml/plantuml/releases/download/v1.2026.2/plantuml-1.2026.2.jar
          printf '#!/bin/sh\nexec java -jar /usr/local/bin/plantuml.jar "$@"\n' \
            | sudo tee /usr/local/bin/plantuml > /dev/null
          sudo chmod +x /usr/local/bin/plantuml

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install library dependencies
        run: npm ci

      - name: Generate grammar index
        run: npm run generate:grammars

      - name: Build library
        run: npm run build

      - name: Install docs-site dependencies
        run: npm ci
        working-directory: docs-site

      - name: Generate API docs
        run: npm run docs

      - name: Build docs site
        run: npm run build
        working-directory: docs-site

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/public

      - id: deployment
        uses: actions/deploy-pages@v5
